name: ssh-run
description: Connect to a server via SSH and execute a command
scope: shared
tags: [ssh, infrastructure]
parameters:
  - name: host
    required: true
    description: Target server hostname or alias (e.g. prod-01, staging)
  - name: command
    required: true
    description: Command to execute on the remote server
  - name: user
    required: false
    default: deploy
    description: SSH user
steps:
  - type: shell
    run: ssh {{ user }}@{{ host }} "{{ command }}"
