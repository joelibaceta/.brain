name: db-connect-postgres
description: Open an interactive psql session to a PostgreSQL database
scope: shared
tags: [database, postgres, psql]
parameters:
  - name: host
    required: true
    description: Database host (e.g. localhost, db.prod.internal)
  - name: port
    required: false
    default: "5432"
    description: Database port
  - name: database
    required: true
    description: Database name
  - name: user
    required: false
    default: "${DB_USER}"
    description: Database user — defaults to $DB_USER env var
  - name: env_file
    required: false
    default: ".env"
    description: Path to .env file to load credentials from
steps:
  - type: shell
    run: >
      set -a && source {{ env_file }} && set +a &&
      PGPASSWORD="${DB_PASSWORD}"
      psql -h {{ host }} -p {{ port }} -U {{ user }} -d {{ database }}
